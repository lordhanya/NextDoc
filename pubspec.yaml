name: next_doc
description: "NextDoc - Modern document management app"
publish_to: 'none'
version: 1.2.1+3

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_animate: ^4.5.2
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  pdfx: ^2.9.2
  path: ^1.9.1
  worker_manager: ^7.2.9
  pdf: ^3.12.0
  image: ^4.8.0
  share_plus: ^12.0.2
  open_filex: ^4.7.0
  flutter_lucide: ^1.11.0
  shared_preferences: ^2.4.0
  gal: ^2.3.2
  syncfusion_flutter_pdf: ^33.2.7
  image_cropper: ^12.2.1
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  isar_generator: ^3.1.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
